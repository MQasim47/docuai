name: docuai
description: AI Document Intelligence App - 100% Free, No API Keys
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── File Picking ──────────────────────────────────────
  file_picker: ^6.1.1
  path_provider: ^2.1.2
  path: ^1.9.0

  # ── Document Reading (all FREE) ───────────────────────
  syncfusion_flutter_pdf: ^24.1.41   # FREE community license for PDF
  excel: ^4.0.2                      # FREE Excel reader
  docx_to_text: 1.0.1               # FREE docx reader

  # ── PDF Generation (FREE) ────────────────────────────
  pdf: ^3.10.8
  printing: ^5.12.0

  # ── UI & Animations (all FREE) ───────────────────────
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  dotted_border: ^2.1.0
  gap: ^3.0.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  iconsax: ^0.0.8

  # ── State Management (FREE) ──────────────────────────
  provider: ^6.1.2

  # ── Storage (FREE) ───────────────────────────────────
  shared_preferences: ^2.2.2

  # ── File Utils (FREE) ────────────────────────────────
  open_file: ^3.3.2
  share_plus: ^9.0.0
  permission_handler: ^11.3.0
  uuid: ^4.3.3
  intl: ^0.19.0

  # ── Icons ─────────────────────────────────────────────
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
